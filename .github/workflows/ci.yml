name: Python CI and CD
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Install uv
          uses: astral-sh/setup-uv@v7
        - run: uv run python src/backend/test_met_service.py
          name: Runs unit test
        - run: uv run python src/backend/test_METHarvest.py
          name: Runs unit test
        - run: uv run python src/backend/test_indicator.py
          name: Runs unit test
        
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_NAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_NAME }}/ada502:latest .

        - name: Push image
          run: docker push ${{ secrets.DOCKER_NAME }}/ada502:latest
          
  deploy:
      runs-on: ubuntu-latest
      needs: test
      steps:
        - name: Deploy to external VM
          uses: appleboy/ssh-action@v0.1.6
          with:
            host: ${{ secrets.VM_HOST }}
            username: ${{ secrets.VM_USER }}
            key: ${{ secrets.VM_SSH_KEY }}
            port: ${{ secrets.VM_PORT }}
            script: |
              sudo docker pull ${{ secrets.DOCKER_NAME }}/ada502:latest
              sudo docker stop ada502 || true
              sudo docker rm ada502 || true
              sudo docker run -d \
                --name ada502 \
                --network app-network \
                -p 8000:8000 \
                -p 8080:8080 \
                ${{ secrets.DOCKER_NAME }}/ada502:latest

              sudo docker run -d --name ada502 -p 8000:8000 -p 8080:8080 ${{ secrets.DOCKER_NAME }}/ada502:latest