name: Python CI and CD
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Install uv
          uses: astral-sh/setup-uv@v7
        #- run: uv run python src/backend/test_met_service.py
          #name: Runs unit test
        #- run: uv run python src/backend/test_METHarvest.py
          #name: Runs unit test
        #- run: uv run python src/backend/test_indicator.py
          #name: Runs unit test

        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_NAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_NAME }}/ada502:latest .

        - name: Push image
          run: docker push ${{ secrets.DOCKER_NAME }}/ada502:latest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to external VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          source: "keycloak-import/realm-export.json"
          target: "/home/${{ secrets.VM_USER }}/keycloak-import/realm-export.json"

      - name: Deploy to external VM 
        uses: appleboy/ssh-action@v0.1.7
        with: 
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}  
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}

          # Inject GitHub secrets into SSH environment
          envs: KEYCLOAK_ADMIN,KEYCLOAK_ADMIN_PASSWORD

          script: |
            set -e

            # ----------------------------------
            # Fix Docker image reference safely
            # ----------------------------------
            
            DOCKER_IMAGE=${{ secrets.DOCKER_NAME }}/ada502:latest
            
            echo "Stopping and cleaning up..."
            sudo docker stop keycloak ada502 || true
            sudo docker rm keycloak ada502 || true

            echo "Creating import folder..."
            mkdir -p /home/${{ secrets.VM_USER }}/keycloak-import
            
            echo "Ensuring network exists..."
            sudo docker network create app-network || true

            echo "Ensuring volume exists..."
            sudo docker volume create keycloak_data || true

            # 2. Start Keycloak - Minimalistisk versjon
            echo "Starting Keycloak..."

            if [ "$(sudo docker ps -aq -f name=keycloak)" ]; then
              echo "Keycloak already exists - restarting..."
              sudo docker start keycloak || true
            else
              echo "Creating Keycloak container..."

              sudo docker run -d \
                --name keycloak \
                --network app-network \
                -p 8080:8080 \
                -e KEYCLOAK_ADMIN=$KEYCLOAK_ADMIN \
                -e KEYCLOAK_ADMIN_PASSWORD=$KEYCLOAK_ADMIN_PASSWORD \
                -e KC_HTTP_ENABLED=true \
                -e KC_HOSTNAME_STRICT=false \
                -e KC_PROXY_HEADERS=xforwarded \
                -v keycloak_data:/opt/keycloak/data \
                -v /home/${{ secrets.VM_USER }}/keycloak-import:/opt/keycloak/data/import \
                quay.io/keycloak/keycloak:26.1 \
                start-dev --import-realm
            fi

            # ----------------------------------
            # Wait for Keycloak
            # ----------------------------------
            echo "Waiting for Keycloak..."
            for i in {1..20}; do
              if curl -s http://localhost:8080 > /dev/null; then
                echo "Keycloak is up!"
                break
              fi
              sleep 5
            done

            echo "Keycloak logs:"
            sudo docker logs keycloak --tail 50 || true

            # ----------------------------------
            # Deploy API
            # ----------------------------------
            echo "Deploying API..."

            sudo docker pull $DOCKER_IMAGE

            sudo docker run -d \
              --name ada502 \
              --network app-network \
              -p 8000:8000 \
              -e SERVER_URL=http://keycloak:8080 \
              -e realm=ADA_502 \
              $DOCKER_IMAGE
