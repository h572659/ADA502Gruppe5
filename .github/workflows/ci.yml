name: Python CI and CD
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Install uv
          uses: astral-sh/setup-uv@v7
        - run: uv run python src/backend/test_met_service.py
          name: Runs unit test
        - run: uv run python src/backend/test_METHarvest.py
          name: Runs unit test
        - run: uv run python src/backend/test_indicator.py
          name: Runs unit test
        
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_NAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_NAME }}/ada502:latest .

        - name: Push image
          run: docker push ${{ secrets.DOCKER_NAME }}/ada502:latest
          
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to external VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}

          # Inject GitHub secrets into SSH environment
          envs: KEYCLOAK_ADMIN,KEYCLOAK_ADMIN_PASSWORD,DOCKER_NAME

          script: |
            set -e

            # ----------------------------------
            # Fix Docker image reference safely
            # ----------------------------------
            DOCKER_IMAGE=${DOCKER_NAME}/ada502:latest

            echo "Creating network..."
            sudo docker network create app-network || true

            echo "Stopping old containers..."
            sudo docker stop keycloak || true
            sudo docker rm keycloak || true
            sudo docker stop ada502 || true
            sudo docker rm ada502 || true

            # ----------------------------------
            # Start Keycloak
            # ----------------------------------
            echo "Starting Keycloak..."
            sudo -E docker run -d \
              --name keycloak \
              --network app-network \
              -p 8080:8080 \
              -e KEYCLOAK_ADMIN=$KEYCLOAK_ADMIN \
              -e KEYCLOAK_ADMIN_PASSWORD=$KEYCLOAK_ADMIN_PASSWORD \
              -v ~/keycloak/import:/opt/keycloak/data/import \
              quay.io/keycloak/keycloak:26.1 \
              start-dev --import-realm

            # ----------------------------------
            # Proper readiness check
            # ----------------------------------
            echo "Waiting for Keycloak..."
            until curl -s http://localhost:8080/realms/master > /dev/null; do
              sleep 5
            done

            echo "Keycloak is ready."

            # ----------------------------------
            # Deploy API
            # ----------------------------------
            echo "Deploying API..."

            sudo -E docker pull $DOCKER_IMAGE

            sudo -E docker run -d \
              --name ada502 \
              --network app-network \
              -p 8000:8000 \
              -e SERVER_URL=http://keycloak:8080/ \
              -e realm=ADA_502 \
              $DOCKER_IMAGE

            echo "Deployment complete."