name: Python CI and CD
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Install uv
          uses: astral-sh/setup-uv@v7
        #- run: uv run python src/backend/test_met_service.py
          #name: Runs unit test
        #- run: uv run python src/backend/test_METHarvest.py
          #name: Runs unit test
        #- run: uv run python src/backend/test_indicator.py
          #name: Runs unit test

        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_NAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_NAME }}/ada502:latest .

        - name: Push image
          run: docker push ${{ secrets.DOCKER_NAME }}/ada502:latest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Ensure realm file exists
        run: |
          mkdir -p keycloak-import
          test -f keycloak-import/realm-export.json || echo '{}' > keycloak-import/realm-export.json

      - name: Deploy to external VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          source: "keycloak-import/realm-export.json"
          target: "/home/${{ secrets.VM_USER }}/keycloak-import/realm-export.json"

      - name: Deploy to external VM 
        uses: appleboy/ssh-action@v0.1.7
        with: 
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}  
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}

          

          script: |

            export KEYCLOAK_ADMIN="${{ secrets.KEYCLOAK_ADMIN }}"
            export KEYCLOAK_ADMIN_PASSWORD="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}"

            echo "User: $KEYCLOAK_ADMIN"
            echo "Password length: ${#KEYCLOAK_ADMIN_PASSWORD}"

            set -e

            # ----------------------------------
            # Fix Docker image reference safely
            # ----------------------------------
            
            DOCKER_IMAGE=${{ secrets.DOCKER_NAME }}/ada502:latest

            echo "Creating import folder..."
            mkdir -p /home/${{ secrets.VM_USER }}/keycloak-import
            
            echo "Ensuring network exists..."
            sudo docker network create app-network || true

            echo "Ensuring volume exists..."
            sudo docker volume create keycloak_data || true

            echo "Starting Keycloak..."

            echo "Recreating Keycloak container (clean state)..."

            echo "Starting Keycloak (smart mode)..."

              # Check if DB already exists
              if sudo docker run --rm -v keycloak_data:/data busybox sh -c "[ -z \"$(ls -A /data)\" ]"; then
                echo "Empty database → importing realm"
                KC_CMD="start-dev --import-realm"
              else
                echo "Existing database → normal start"
                KC_CMD="start-dev"
              fi

              # Always recreate container (safe)
              sudo docker rm -f keycloak ada502 || true

              sudo docker run -d \
                --name keycloak \
                --network app-network \
                -p 8080:8080 \
                --restart unless-stopped \
                -e KC_BOOTSTRAP_ADMIN_USERNAME="${KEYCLOAK_ADMIN}" \
                -e KC_BOOTSTRAP_ADMIN_PASSWORD="${KEYCLOAK_ADMIN_PASSWORD}" \
                -e KC_HTTP_ENABLED=true \
                -e KC_HOSTNAME=158.37.66.185 \
                -e KC_HOSTNAME_PORT=8080 \
                -e KC_HOSTNAME_STRICT=false \
                -e KC_HOSTNAME_STRICT_HTTPS=false \
                -e KC_PROXY_HEADERS=xforwarded \
                -v keycloak_data:/opt/keycloak/data \
                -v /home/${{ secrets.VM_USER }}/keycloak-import:/opt/keycloak/data/import \
                quay.io/keycloak/keycloak:26.1 \
                $KC_CMD

            # ----------------------------------
            # Wait for Keycloak
            # ----------------------------------
            echo "Waiting for Keycloak..."
            for i in {1..20}; do
              if curl -s http://localhost:8080 > /dev/null; then
                echo "Keycloak is up!"
                break
              fi
              sleep 5
            done

            echo "Keycloak logs:"
            sudo docker logs keycloak --tail 50 || true

            # ----------------------------------
            # Deploy API
            # ----------------------------------
            echo "Deploying API..."

            sudo docker pull $DOCKER_IMAGE

            sudo docker run -d \
              --name ada502 \
              --network app-network \
              -p 8000:8000 \
              -e SERVER_URL=http://keycloak:8080 \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e realm=ADA_502 \
              $DOCKER_IMAGE
