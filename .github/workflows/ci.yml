name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'  # Directly specify version from src/backend/.python-version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the local frcm wheel first
          pip install lib/frcm-0.1.0-py3-none-any.whl
          # Install src/backend requirements
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd src/backend
          python -m unittest test_met_service.py
          python -m unittest test_METHarvest.py  