name: Python CI
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Install uv
          uses: astral-sh/setup-uv@v7
        - run: uv run python src\backend\test_met_service.py
          name: Runs unit test
        - run: uv run python src\backend\test_METHarvest.py
          name: Runs integration tests
