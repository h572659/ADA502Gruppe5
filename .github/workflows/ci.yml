name: Python CI and CD
on:
  [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - name: Check out repository code
          uses: actions/checkout@v5
        - name: Install uv
          uses: astral-sh/setup-uv@v7
        - run: uv run python src/backend/test_met_service.py
          name: Runs unit test
        - run: uv run python src/backend/test_METHarvest.py
          name: Runs unit test
        - run: uv run python src/backend/test_indicator.py
          name: Runs unit test
        
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build image
          run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ada502:latest .

        - name: Push image
          run: docker push ${{ secrets.DOCKER_USERNAME }}/ada502:latest
